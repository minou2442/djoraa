name: djoraa_mobile
description: "A modern healthcare application for managing medical files, prescriptions, appointments, and more. Built with Flutter using clean architecture principles."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & Riverpod
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # HTTP & API
  dio: ^5.3.0
  retrofit: ^4.0.0
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0

  # Storage & Local Database
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Navigation & Routing
  go_router: ^12.0.0
  page_transition: ^2.1.0

  # UI & Design
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  
  # Localization
  intl: ^0.19.0

  # Date & Time
  intl: ^0.19.0

  # Freezed for immutable models
  freezed_annotation: ^2.4.0

  # Logger
  logger: ^2.0.0

  # Device Info
  device_info_plus: ^9.1.0
  package_info_plus: ^5.0.0

  # Connectivity
  connectivity_plus: ^5.0.0

  # Camera for image uploads
  image_picker: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.0
  freezed: ^2.4.0
  retrofit_generator: ^7.0.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
